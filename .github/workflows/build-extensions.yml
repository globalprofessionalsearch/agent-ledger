name: Build Extensions

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/build-extensions.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
            out: zstd_vfs-darwin-x86_64.dylib
            src: build/zstd_vfs.dylib

          - runner: macos-14
            arch: arm64
            out: zstd_vfs-darwin-arm64.dylib
            src: build/zstd_vfs.dylib

          - runner: ubuntu-latest
            arch: x86_64
            out: zstd_vfs-linux-x86_64.so
            src: build/zstd_vfs.so
            cross: false

          - runner: ubuntu-latest
            arch: aarch64
            out: zstd_vfs-linux-aarch64.so
            src: build/zstd_vfs.so
            cross: true

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: mlin/sqlite_zstd_vfs
          ref: 228f6d12c55f69e584d909024d8ef9d599f2f398

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake sqlite zstd

      - name: Install deps (Linux x86_64)
        if: runner.os == 'Linux' && matrix.cross == false
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libsqlite3-dev libzstd-dev libcurl4-openssl-dev

      - name: Install deps (Linux aarch64 cross)
        if: runner.os == 'Linux' && matrix.cross == true
        run: |
          sudo dpkg --add-architecture arm64
          # ports.ubuntu.com carries arm64 packages; security.ubuntu.com does not
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update
          sudo apt-get install -y cmake \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libzstd-dev:arm64 \
            libcurl4-openssl-dev:arm64 \
            libsqlite3-dev:arm64

      - name: Build (native)
        if: matrix.cross == false || runner.os == 'macOS'
        run: |
          EXTRA_FLAGS=""
          if command -v brew &>/dev/null; then
            ZSTD_INC="$(brew --prefix zstd)/include"
            EXTRA_FLAGS="-DCMAKE_PREFIX_PATH=$(brew --prefix) -DCMAKE_CXX_FLAGS=-I${ZSTD_INC}"
          fi
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            ${EXTRA_FLAGS} \
            -B build
          cmake --build build -j4

      - name: Build (aarch64 cross)
        if: matrix.cross == true
        run: |
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -B build
          cmake --build build -j4

      - name: Rename artifact
        run: mv ${{ matrix.src }} ${{ matrix.out }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: ${{ matrix.out }}

  commit:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/download-artifact@v4
        with:
          path: extensions
          merge-multiple: true

      - name: Commit extensions to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extensions/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "build: update vendored zstd_vfs extensions"
          git push
