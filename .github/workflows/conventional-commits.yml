name: Conventional Commits

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          pattern='^(feat|fix|docs|style|refactor|perf|test|chore|build|ci|revert)(\([^)]+\))?!?: .'
          failed=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qE "$pattern"; then
              echo "❌ Invalid: $msg"
              failed=1
            else
              echo "✅ OK:      $msg"
            fi
          done < <(git log --no-merges --format="%s" origin/main..HEAD)
          if [ $failed -ne 0 ]; then
            echo ""
            echo "Commits must follow Conventional Commits: https://www.conventionalcommits.org"
            echo "  feat: add search pagination"
            echo "  fix(daemon): handle missing JSONL files"
            echo "  docs: update MCP registration instructions"
            exit 1
          fi
